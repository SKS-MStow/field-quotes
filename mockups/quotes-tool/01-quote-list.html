<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Quotes — SKS Quotes</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css?v=20260515r16">
  <link rel="stylesheet" href="css/mockups.css?v=20260515r16">
  <style>
    .quote-num { font-family: var(--font-heading); font-weight: 600; color: var(--text-primary); }
    .quote-rev { color: var(--text-muted); font-size: 11px; margin-left: 6px; font-weight: 500; }
    .quote-client { font-weight: 500; color: var(--text-primary); }
    .quote-project { color: var(--text-secondary); font-size: 12px; margin-top: 1px; }
    .quote-value { font-family: var(--font-heading); font-weight: 600; color: var(--text-primary); text-align: right; white-space: nowrap; }
    .quote-date { color: var(--text-secondary); white-space: nowrap; font-size: 12px; }
    .quote-prepared { color: var(--text-secondary); white-space: nowrap; font-size: 12px; }
    .row-actions { display: flex; gap: 4px; justify-content: flex-end; }
    .no-results { padding: 40px 20px; text-align: center; color: var(--text-muted); }
    .no-results .material-symbols-outlined { font-size: 36px; color: var(--border-hover); margin-bottom: 8px; }
    .no-results h4 { font-family: var(--font-heading); font-size: 14px; font-weight: 600; color: var(--text-secondary); margin: 4px 0; }

    /* Badge filter bar (c_7m99jw) — replaces KPI strip + filter dropdowns. */
    .badge-filters { background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 8px 12px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
    .bf-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .bf-group-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); font-weight: 700; margin-right: 4px; min-width: 50px; }
    .bf-spacer { flex: 1; }
    .bf-pill { background: var(--surface-inset); border: 1px solid var(--border); padding: 5px 12px; border-radius: 999px; font-size: 12.5px; color: var(--text-secondary); cursor: pointer; font-family: var(--font-body); font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
    .bf-pill:hover { background: var(--surface-white); border-color: var(--border-hover); }
    .bf-pill.active { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }
    .bf-pill.won.active { background: var(--status-success, #2c8a4a); border-color: var(--status-success, #2c8a4a); }
    .bf-pill.lost.active { background: var(--status-danger, #b1352a); border-color: var(--status-danger, #b1352a); }
    .bf-pill .material-symbols-outlined { font-size: 14px; }
    .bf-pill.owner-cycle[data-owner-mode="mine"] { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }
    .bf-pill.owner-cycle[data-owner-mode="others"] { background: var(--status-warning, #b58400); color: white; border-color: var(--status-warning, #b58400); }

    /* More-filters disclosure */
    .more-filters { display: flex; gap: 10px; align-items: center; margin-top: 8px; padding: 10px 12px; background: var(--surface-inset); border-radius: var(--radius-md); flex-wrap: wrap; }
    .more-filters select { font-size: 13px; padding: 6px 8px; border: 1px solid var(--border-input); border-radius: var(--radius-md); background: var(--surface-white); font-family: var(--font-body); color: var(--text-primary); }

    /* Column resize stubs */
    table.data-table thead th { position: relative; }
    table.data-table thead th .col-resizer { position: absolute; right: 0; top: 0; bottom: 0; width: 5px; cursor: col-resize; opacity: 0; transition: opacity 0.15s; background: var(--accent-primary); }
    table.data-table thead th:hover .col-resizer { opacity: 0.4; }

    /* Right-click context menu (stub) */
    .col-ctx-menu { position: fixed; z-index: 9990; background: white; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 6px 0; min-width: 220px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); font-family: var(--font-body); }
    .col-ctx-menu .item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; font-size: 13px; color: var(--text-primary); cursor: pointer; }
    .col-ctx-menu .item:hover { background: var(--surface-inset); }
    .col-ctx-menu .item .material-symbols-outlined { font-size: 16px; color: var(--text-muted); }
    .col-ctx-menu .divider { height: 1px; background: var(--border-light); margin: 4px 0; }
    .col-ctx-menu .heading { padding: 6px 14px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 600; }

    .filter-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: var(--accent-primary-bg, var(--surface-inset)); color: var(--accent-primary); border: 1px solid var(--accent-primary); border-radius: 12px; font-size: 11px; font-weight: 500; cursor: pointer; }
    .filter-chip:hover { background: var(--accent-primary); color: white; }
    .filter-chip .x { font-weight: 700; opacity: 0.7; margin-left: 2px; }
    .filter-chip:hover .x { opacity: 1; }
    .col-sort-ind { display: inline-block; }
  </style>
</head>
<body data-page="quotes">

  <main id="content" class="content">

    <!-- Badge filter bar (c_7m99jw): replaces the old KPI strip + filter
         dropdowns. Each pill toggles its filter on/off; the Owner pill
         click-cycles through three modes (Anyone → Mine only → Others). -->
    <div class="badge-filters" id="badge-filters">
      <div class="bf-row">
        <span class="bf-group-label">Status</span>
        <button class="bf-pill active" data-bf="status" data-val="">All</button>
        <button class="bf-pill" data-bf="status" data-val="draft">Draft</button>
        <button class="bf-pill" data-bf="status" data-val="issued">Issued</button>
        <button class="bf-pill won" data-bf="status" data-val="accepted">Won</button>
        <button class="bf-pill lost" data-bf="status" data-val="declined">Declined</button>
        <button class="bf-pill" data-bf="status" data-val="expired">Expired</button>
        <button class="bf-pill" data-bf="status" data-val="revised">Revised</button>
      </div>
      <div class="bf-row">
        <span class="bf-group-label">Mode</span>
        <button class="bf-pill active" data-bf="mode" data-val="">All</button>
        <button class="bf-pill" data-bf="mode" data-val="quick">Quick</button>
        <button class="bf-pill" data-bf="mode" data-val="large">Large</button>
        <span class="bf-spacer"></span>
        <!-- 3-mode click-through: Anyone → Mine only → Others -->
        <button class="bf-pill owner-cycle" id="bf-owner" data-owner-mode="any">
          <span class="material-symbols-outlined">person</span><span id="bf-owner-label">Anyone</span>
        </button>
        <button class="btn btn-secondary btn-sm" id="reset-data" title="Reset mockup data to defaults"><span class="material-symbols-outlined">restart_alt</span> Reset demo</button>
      </div>
    </div>

    <!-- Search + sort -->
    <div class="filters-row" style="margin-top:10px;">
      <div class="search-wrap">
        <span class="material-symbols-outlined">search</span>
        <input id="filter-search" type="text" class="form-input" placeholder="Search by quote #, client, project…">
      </div>
      <select class="form-input" id="filter-sort" style="max-width:200px;">
        <option value="newest">Sort: Newest first</option>
        <option value="oldest">Sort: Oldest first</option>
        <option value="value-high">Sort: Value high → low</option>
        <option value="value-low">Sort: Value low → high</option>
        <option value="client">Sort: Client A–Z</option>
      </select>
      <span style="flex:1;font-size:11px;color:var(--text-muted);">
        Click a column header to sort · right-click for filters.
      </span>
    </div>
    <!-- Hidden inputs that drive the existing filter JS — set by the badge pills -->
    <input type="hidden" id="filter-status" value="">
    <input type="hidden" id="filter-mode" value="">
    <input type="hidden" id="filter-prep" value="">

    <!-- Quote table -->
    <div class="table-wrap" id="table-host"></div>

  </main>

  <script src="js/mock-data.js?v=20260515r16"></script>
  <script src="js/mock-state.js?v=20260515r16"></script>
  <script src="js/mock-ui.js?v=20260515r16"></script>
  <script src="js/mock-shell.js?v=20260515r16"></script>
  <script src="js/mock-expiry.js?v=20260515r16"></script>
  <script src="../_shared/tables/grid-table.js?v=20260515r16"></script>
  <script src="../_shared/review-tools/mock-review.js?v=20260515r16"></script>
  <script>
    MockShell.mount({
      title: 'Quotes',
      subtitle: 'All quotes',
      actionsHtml: `
        <button class="btn btn-secondary" id="export-btn"><span class="material-symbols-outlined">file_download</span> Export</button>
        <a class="btn btn-primary" href="02-mode-select.html"><span class="material-symbols-outlined">add</span> New Quote</a>`
    });

    // -------- Read URL filter (e.g. ?filter=draft from sidebar) --------
    const params = new URLSearchParams(location.search);
    const initialStatus = params.get('filter') || '';

    // -------- KPI computations --------
    function renderKpis(quotes) {
      const openPipeline = quotes.filter(q => q.status === 'issued').reduce((s, q) => s + (q.value || 0), 0);
      const draftCount = quotes.filter(q => q.status === 'draft').length;
      const wonFy = quotes.filter(q => q.status === 'accepted').reduce((s, q) => s + (q.value || 0), 0);
      const wonCount = quotes.filter(q => q.status === 'accepted').length;
      const decided = quotes.filter(q => ['accepted','declined'].includes(q.status));
      const winRate = decided.length ? Math.round((decided.filter(q => q.status === 'accepted').length / decided.length) * 100) : 0;

      document.getElementById('kpi-host').innerHTML = `
        <div class="kpi">
          <div class="kpi-label">Open Pipeline</div>
          <div class="kpi-value">${MockUI.fmtMoney(openPipeline)}</div>
          <div class="kpi-sub">Issued, not yet decided</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Drafts in Progress</div>
          <div class="kpi-value">${draftCount}</div>
          <div class="kpi-sub">${draftCount === 1 ? 'In your queue' : 'Across the team'}</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Won this FY</div>
          <div class="kpi-value">${MockUI.fmtMoney(wonFy)}</div>
          <div class="kpi-sub">${wonCount} quote${wonCount === 1 ? '' : 's'} accepted</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Win Rate</div>
          <div class="kpi-value">${winRate}%</div>
          <div class="kpi-sub">Last 12 months</div>
        </div>
      `;
    }

    // -------- Column accessors (drives sort + filter + chip labels) --------
    const COL_DEFS = {
      number:     { label: 'Quote #',          val: q => q.number,                      type: 'string' },
      client:     { label: 'Client / Project', val: q => (q.client.name || '') + ' — ' + (q.project.name || ''), type: 'string' },
      value:      { label: 'Value',            val: q => Number(q.value || 0),          type: 'number',
                    fmt: v => MockUI.fmtMoney(v) },
      issued:     { label: 'Issued',           val: q => q.createdAt || '',             type: 'date' },
      validUntil: { label: 'Valid Until',      val: q => q.validUntil || '',            type: 'date' },
      status:     { label: 'Status',           val: q => q.status || '',                type: 'string' },
      mode:       { label: 'Mode',             val: q => q.mode || '',                  type: 'string' },
      prep:       { label: 'Prepared by',      val: q => q.preparedBy || '',            type: 'string' }
    };
    // Per-column sort state ('asc' / 'desc' / null) and filter state
    // ({ values: Set<string>, contains: string }). Both compose with the existing
    // pill-tab status filter and the legacy filter dropdowns.
    let colSortCol = null;     // only one column sorted at a time
    let colSortDir = null;
    const colFilters = {};     // col → { values?: Set<string>, contains?: string }

    function colValue(q, col) { const def = COL_DEFS[col]; return def ? def.val(q) : ''; }
    function colDisplay(v, col) {
      const def = COL_DEFS[col];
      if (def && def.fmt) return def.fmt(v);
      return v == null ? '' : String(v);
    }

    // -------- Filter + sort --------
    function filterAndSort(quotes) {
      const q   = document.getElementById('filter-search').value.trim().toLowerCase();
      const st  = document.getElementById('filter-status').value;
      const md  = document.getElementById('filter-mode').value;
      const pr  = document.getElementById('filter-prep').value;
      const so  = document.getElementById('filter-sort').value;

      let out = quotes.slice();
      if (q)  out = out.filter(qq => (qq.number + ' ' + (qq.client.name || '') + ' ' + (qq.project.name || '')).toLowerCase().includes(q));
      if (st) out = out.filter(qq => qq.status === st);
      if (md) out = out.filter(qq => qq.mode === md);
      if (pr === '__not_me__') {
        // 3-mode owner pill "Others"
        out = out.filter(qq => qq.preparedBy !== 'Mark Stowell');
      } else if (pr) {
        out = out.filter(qq => qq.preparedBy === pr);
      }

      // Per-column filters from the right-click menu
      Object.entries(colFilters).forEach(([col, f]) => {
        if (f.values && f.values.size > 0) {
          out = out.filter(qq => f.values.has(String(colValue(qq, col))));
        }
        if (f.contains) {
          const needle = f.contains.toLowerCase();
          out = out.filter(qq => String(colValue(qq, col)).toLowerCase().includes(needle));
        }
      });

      // Click-to-sort overrides the legacy "Sort:" dropdown when active
      if (colSortCol && colSortDir) {
        const def = COL_DEFS[colSortCol];
        const dir = colSortDir === 'asc' ? 1 : -1;
        out.sort((a, b) => {
          const av = colValue(a, colSortCol);
          const bv = colValue(b, colSortCol);
          if (def && def.type === 'number') return (av - bv) * dir;
          return String(av).localeCompare(String(bv)) * dir;
        });
      } else {
        out.sort((a, b) => {
          switch (so) {
            case 'oldest':     return (a.createdAt || '').localeCompare(b.createdAt || '');
            case 'value-high': return (b.value || 0) - (a.value || 0);
            case 'value-low':  return (a.value || 0) - (b.value || 0);
            case 'client':     return (a.client.name || '').localeCompare(b.client.name || '');
            case 'newest':
            default:           return (b.createdAt || '').localeCompare(a.createdAt || '');
          }
        });
      }
      return out;
    }

    // -------- Render table --------
    function renderTable() {
      const all = MockState.getQuotes();
      // KPI strip removed (c_7m99jw) — filters are now badge-based above.
      renderFilterChips();
      const rows = filterAndSort(all);
      const host = document.getElementById('table-host');

      if (rows.length === 0) {
        host.innerHTML = `
          <div class="no-results">
            <span class="material-symbols-outlined">search_off</span>
            <h4>No quotes match those filters</h4>
            <div style="font-size:13px;">Clear the filters or start a new quote.</div>
          </div>`;
        return;
      }

      const rowsHtml = rows.map(q => {
        const badge = MockUI.statusBadge(q.status);
        return `
          <tr class="clickable" data-open="${q.id}">
            <td>
              <span class="quote-num">${q.number}</span>
              <span class="quote-rev">Rev ${q.revision}</span>
            </td>
            <td>
              <div class="quote-client">${q.client.name || '—'}</div>
              <div class="quote-project">${q.project.name || '—'}</div>
            </td>
            <td class="num right">${q.value ? MockUI.fmtMoney(q.value) : '—'}</td>
            <td class="quote-date">${q.status === 'draft' ? '—' : MockUI.fmtDate(q.createdAt)}</td>
            <td class="quote-date">${q.status === 'draft' ? '—' : MockUI.fmtDate(q.validUntil)}</td>
            <td><span class="${badge.cls}">${badge.label}</span></td>
            <td><span class="badge badge-muted" style="text-transform:capitalize;">${q.mode}</span></td>
            <td class="quote-prepared">${(q.preparedBy || '').replace(/^(\w+)\s+(\w).*/, '$1 $2.')}</td>
            <td class="right">
              <div class="row-actions">
                <button class="icon-btn" title="${q.status === 'draft' ? 'Edit' : 'View'}" data-open="${q.id}">
                  <span class="material-symbols-outlined">${q.status === 'draft' ? 'edit' : 'visibility'}</span>
                </button>
                <button class="icon-btn" title="More" data-more="${q.id}"><span class="material-symbols-outlined">more_horiz</span></button>
              </div>
            </td>
          </tr>`;
      }).join('');

      host.innerHTML = `
        <div class="table-scroll">
          <table class="data-table grid-table">
            <thead>
              <tr>
                <th data-col="number">Quote #<span class="col-resizer"></span></th>
                <th data-col="client">Client / Project<span class="col-resizer"></span></th>
                <th class="right" data-col="value">Value<span class="col-resizer"></span></th>
                <th data-col="issued">Issued<span class="col-resizer"></span></th>
                <th data-col="validUntil">Valid Until<span class="col-resizer"></span></th>
                <th data-col="status">Status<span class="col-resizer"></span></th>
                <th data-col="mode">Mode<span class="col-resizer"></span></th>
                <th data-col="prep">Prepared by<span class="col-resizer"></span></th>
                <th class="right"></th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
        <div class="pagination">
          <div>Showing ${rows.length} of ${all.length}</div>
          <div class="pager">
            <button class="pager-btn" disabled>‹ Prev</button>
            <button class="pager-btn active">1</button>
            <button class="pager-btn" disabled>Next ›</button>
          </div>
        </div>`;

      // Wire row clicks
      host.querySelectorAll('[data-open]').forEach(el => {
        el.addEventListener('click', e => {
          e.stopPropagation();
          const id = el.getAttribute('data-open');
          MockState.setCurrentQuote(id);
          const q = MockState.getQuote(id);
          // Drafts open the builder; issued quotes open the output preview
          location.href = q.status === 'draft' ? '04-area-builder.html' : '06-output-preview.html';
        });
      });

      host.querySelectorAll('[data-more]').forEach(el => {
        el.addEventListener('click', e => {
          e.stopPropagation();
          MockUI.toast('Mockup — would open a context menu (duplicate / revise / archive / delete)');
        });
      });

      // Wire column-resize stub (visual only)
      host.querySelectorAll('th .col-resizer').forEach(handle => {
        let start = 0, startW = 0, th;
        handle.addEventListener('mousedown', e => {
          th = handle.parentElement;
          start = e.clientX;
          startW = th.offsetWidth;
          document.body.style.cursor = 'col-resize';
          const move = ev => { th.style.width = Math.max(60, startW + (ev.clientX - start)) + 'px'; };
          const up = () => { document.body.style.cursor = ''; document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
          document.addEventListener('mousemove', move);
          document.addEventListener('mouseup', up);
        });
      });

      // Wire right-click context menu (real) + click-to-sort
      host.querySelectorAll('thead th[data-col]').forEach(th => {
        const col = th.getAttribute('data-col');
        // Sort indicator
        const indicator = (colSortCol === col)
          ? `<span class="col-sort-ind" style="margin-left:4px;font-size:11px;color:var(--accent-primary);">${colSortDir === 'asc' ? '▲' : '▼'}</span>`
          : '';
        if (indicator) th.innerHTML = th.innerHTML.replace('<span class="col-resizer">', indicator + '<span class="col-resizer">');
        th.style.cursor = 'pointer';
        th.title = 'Click to sort · right-click for filter / sort menu';
        th.addEventListener('click', e => {
          if (e.target.classList && (e.target.classList.contains('col-resizer') || e.target.closest('.col-ctx-menu'))) return;
          // Cycle: none → asc → desc → none
          if (colSortCol !== col) { colSortCol = col; colSortDir = 'asc'; }
          else if (colSortDir === 'asc') { colSortDir = 'desc'; }
          else if (colSortDir === 'desc') { colSortCol = null; colSortDir = null; }
          renderTable();
        });
        th.addEventListener('contextmenu', e => {
          e.preventDefault();
          openColCtxMenu(e.clientX, e.clientY, col, COL_DEFS[col] ? COL_DEFS[col].label : col, MockState.getQuotes());
        });
      });
    }

    // -------- Active filter chips --------
    function renderFilterChips() {
      let host = document.getElementById('filter-chips');
      if (!host) {
        host = document.createElement('div');
        host.id = 'filter-chips';
        host.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;align-items:center;';
        const tableHost = document.getElementById('table-host');
        tableHost.parentNode.insertBefore(host, tableHost);
      }
      const chips = [];
      Object.entries(colFilters).forEach(([col, f]) => {
        const label = COL_DEFS[col] ? COL_DEFS[col].label : col;
        if (f.values && f.values.size > 0) {
          const labelText = f.values.size <= 2
            ? Array.from(f.values).join(', ')
            : f.values.size + ' values';
          chips.push(`<span class="filter-chip" data-clear-col="${col}" data-clear-key="values">${label}: ${labelText} <span class="x">×</span></span>`);
        }
        if (f.contains) {
          chips.push(`<span class="filter-chip" data-clear-col="${col}" data-clear-key="contains">${label} contains "${f.contains}" <span class="x">×</span></span>`);
        }
      });
      host.innerHTML = chips.length === 0
        ? ''
        : chips.join('') + '<button id="filter-clear-all" style="background:none;border:none;color:var(--text-muted);font-size:12px;cursor:pointer;text-decoration:underline;margin-left:4px;">Clear all</button>';
      host.querySelectorAll('[data-clear-col]').forEach(chip => {
        chip.addEventListener('click', () => {
          const col = chip.getAttribute('data-clear-col');
          const key = chip.getAttribute('data-clear-key');
          if (colFilters[col]) {
            delete colFilters[col][key];
            if (!colFilters[col].values && !colFilters[col].contains) delete colFilters[col];
          }
          renderTable();
        });
      });
      const clearAll = document.getElementById('filter-clear-all');
      if (clearAll) clearAll.addEventListener('click', () => {
        Object.keys(colFilters).forEach(c => delete colFilters[c]);
        renderTable();
      });
    }

    // Right-click column context menu (real — sort + filter)
    function closeColCtxMenu() {
      document.querySelectorAll('.col-ctx-menu, .col-filter-pop').forEach(m => m.remove());
      document.removeEventListener('keydown', _ctxEsc, true);
    }
    function _ctxEsc(e) { if (e.key === 'Escape') closeColCtxMenu(); }
    function openColCtxMenu(x, y, col, label, allRows) {
      closeColCtxMenu();
      const menu = document.createElement('div');
      menu.className = 'col-ctx-menu';
      menu.style.left = x + 'px';
      menu.style.top  = y + 'px';
      menu.innerHTML = `
        <div class="heading">${label}</div>
        <div class="item" data-act="sort-asc"><span class="material-symbols-outlined">arrow_upward</span> Sort A→Z (ascending)</div>
        <div class="item" data-act="sort-desc"><span class="material-symbols-outlined">arrow_downward</span> Sort Z→A (descending)</div>
        <div class="item" data-act="sort-clear"${(colSortCol === col) ? '' : ' style="opacity:0.5;"'}><span class="material-symbols-outlined">close</span> Clear sort on this column</div>
        <div class="divider"></div>
        <div class="item" data-act="filter-by"><span class="material-symbols-outlined">filter_alt</span> Filter by this column…</div>
        <div class="item" data-act="filter-contains"><span class="material-symbols-outlined">search</span> Filter contains text…</div>
        <div class="item" data-act="filter-clear"${(colFilters[col]) ? '' : ' style="opacity:0.5;"'}><span class="material-symbols-outlined">backspace</span> Clear filter on this column</div>
        <div class="divider"></div>
        <div class="item" data-act="group-by" style="opacity:0.6;"><span class="material-symbols-outlined">workspaces</span> Group by this column <span style="font-size:10px;color:var(--text-muted);margin-left:auto;">(stub)</span></div>
        <div class="item" data-act="autosize" style="opacity:0.6;"><span class="material-symbols-outlined">width</span> Auto-size column <span style="font-size:10px;color:var(--text-muted);margin-left:auto;">(stub)</span></div>
        <div class="item" data-act="hide" style="opacity:0.6;"><span class="material-symbols-outlined">visibility_off</span> Hide column <span style="font-size:10px;color:var(--text-muted);margin-left:auto;">(stub)</span></div>
      `;
      document.body.appendChild(menu);
      const r = menu.getBoundingClientRect();
      if (r.right > window.innerWidth) menu.style.left = (window.innerWidth - r.width - 8) + 'px';
      if (r.bottom > window.innerHeight) menu.style.top = (window.innerHeight - r.height - 8) + 'px';
      menu.querySelectorAll('.item').forEach(it => {
        it.addEventListener('click', e => {
          e.stopPropagation();
          const act = it.getAttribute('data-act');
          if (act === 'sort-asc')        { colSortCol = col; colSortDir = 'asc';  closeColCtxMenu(); renderTable(); return; }
          if (act === 'sort-desc')       { colSortCol = col; colSortDir = 'desc'; closeColCtxMenu(); renderTable(); return; }
          if (act === 'sort-clear')      { if (colSortCol === col) { colSortCol = null; colSortDir = null; } closeColCtxMenu(); renderTable(); return; }
          if (act === 'filter-by')       { openFilterByPopover(x, y, col, label, allRows); return; }
          if (act === 'filter-contains') { openFilterContainsPopover(x, y, col, label); return; }
          if (act === 'filter-clear')    { delete colFilters[col]; closeColCtxMenu(); renderTable(); return; }
          MockUI.toast(`"${it.textContent.trim().split('  ')[0]}" — mockup stub`, 'warn');
          closeColCtxMenu();
        });
      });
      setTimeout(() => document.addEventListener('click', closeColCtxMenu, { once: true }), 0);
      document.addEventListener('keydown', _ctxEsc, true);
    }

    // Sub-popover: multi-select unique values
    function openFilterByPopover(x, y, col, label, allRows) {
      closeColCtxMenu();
      const uniques = Array.from(new Set(allRows.map(q => String(colValue(q, col))))).sort();
      const current = (colFilters[col] && colFilters[col].values) || new Set();
      const pop = document.createElement('div');
      pop.className = 'col-filter-pop col-ctx-menu';
      pop.style.left = x + 'px'; pop.style.top = y + 'px'; pop.style.minWidth = '240px';
      pop.innerHTML = `
        <div class="heading">Filter ${label}</div>
        <div style="padding:6px 10px;"><input type="text" id="fpop-search" placeholder="Search values…" class="form-input" style="width:100%;padding:4px 6px;font-size:12px;"></div>
        <div id="fpop-list" style="max-height:240px;overflow-y:auto;padding:0 10px;">
          ${uniques.map(v => `
            <label style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px;cursor:pointer;">
              <input type="checkbox" value="${String(v).replace(/"/g, '&quot;')}" ${current.has(String(v)) ? 'checked' : ''}>
              <span>${colDisplay(v, col) || '(empty)'}</span>
            </label>
          `).join('')}
        </div>
        <div style="display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--border-light);">
          <button class="btn btn-secondary btn-sm" id="fpop-clear">Clear</button>
          <div style="flex:1;"></div>
          <button class="btn btn-secondary btn-sm" id="fpop-cancel">Cancel</button>
          <button class="btn btn-primary btn-sm" id="fpop-apply">Apply</button>
        </div>
      `;
      document.body.appendChild(pop);
      const r = pop.getBoundingClientRect();
      if (r.right > window.innerWidth) pop.style.left = (window.innerWidth - r.width - 8) + 'px';
      if (r.bottom > window.innerHeight) pop.style.top = (window.innerHeight - r.height - 8) + 'px';
      pop.addEventListener('click', e => e.stopPropagation());
      const search = pop.querySelector('#fpop-search');
      search.addEventListener('input', () => {
        const needle = search.value.toLowerCase();
        pop.querySelectorAll('#fpop-list label').forEach(l => {
          l.style.display = l.textContent.toLowerCase().includes(needle) ? '' : 'none';
        });
      });
      pop.querySelector('#fpop-apply').addEventListener('click', () => {
        const checked = Array.from(pop.querySelectorAll('#fpop-list input:checked')).map(c => c.value);
        if (checked.length === 0) {
          if (colFilters[col]) delete colFilters[col].values;
        } else {
          colFilters[col] = colFilters[col] || {};
          colFilters[col].values = new Set(checked);
        }
        if (colFilters[col] && !colFilters[col].values && !colFilters[col].contains) delete colFilters[col];
        closeColCtxMenu(); renderTable();
      });
      pop.querySelector('#fpop-clear').addEventListener('click', () => {
        if (colFilters[col]) delete colFilters[col].values;
        if (colFilters[col] && !colFilters[col].values && !colFilters[col].contains) delete colFilters[col];
        closeColCtxMenu(); renderTable();
      });
      pop.querySelector('#fpop-cancel').addEventListener('click', closeColCtxMenu);
      setTimeout(() => document.addEventListener('click', closeColCtxMenu, { once: true }), 0);
      document.addEventListener('keydown', _ctxEsc, true);
      search.focus();
    }

    // Sub-popover: contains text
    function openFilterContainsPopover(x, y, col, label) {
      closeColCtxMenu();
      const current = (colFilters[col] && colFilters[col].contains) || '';
      const pop = document.createElement('div');
      pop.className = 'col-filter-pop col-ctx-menu';
      pop.style.left = x + 'px'; pop.style.top = y + 'px'; pop.style.minWidth = '260px';
      pop.innerHTML = `
        <div class="heading">${label} contains…</div>
        <div style="padding:8px 10px;"><input type="text" id="fcontains" value="${current.replace(/"/g, '&quot;')}" placeholder="Type to filter…" class="form-input" style="width:100%;padding:4px 6px;font-size:12px;"></div>
        <div style="display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--border-light);">
          <div style="flex:1;"></div>
          <button class="btn btn-secondary btn-sm" id="fc-cancel">Cancel</button>
          <button class="btn btn-primary btn-sm" id="fc-apply">Apply</button>
        </div>
      `;
      document.body.appendChild(pop);
      const r = pop.getBoundingClientRect();
      if (r.right > window.innerWidth) pop.style.left = (window.innerWidth - r.width - 8) + 'px';
      if (r.bottom > window.innerHeight) pop.style.top = (window.innerHeight - r.height - 8) + 'px';
      pop.addEventListener('click', e => e.stopPropagation());
      const apply = () => {
        const v = pop.querySelector('#fcontains').value.trim();
        if (!v) {
          if (colFilters[col]) delete colFilters[col].contains;
        } else {
          colFilters[col] = colFilters[col] || {};
          colFilters[col].contains = v;
        }
        if (colFilters[col] && !colFilters[col].values && !colFilters[col].contains) delete colFilters[col];
        closeColCtxMenu(); renderTable();
      };
      pop.querySelector('#fc-apply').addEventListener('click', apply);
      pop.querySelector('#fc-cancel').addEventListener('click', closeColCtxMenu);
      pop.querySelector('#fcontains').addEventListener('keydown', e => { if (e.key === 'Enter') apply(); });
      setTimeout(() => document.addEventListener('click', closeColCtxMenu, { once: true }), 0);
      document.addEventListener('keydown', _ctxEsc, true);
      pop.querySelector('#fcontains').focus();
    }

    // -------- Wire filters --------
    ['filter-search','filter-status','filter-mode','filter-prep','filter-sort'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('input', renderTable);
      el.addEventListener('change', renderTable);
    });

    // Badge filter pills (c_7m99jw). Each pill toggles its filter via a
    // hidden input that the existing filterAndSort() reads. Pills in the same
    // bf group are mutually exclusive; an active pill click does nothing.
    function applyBadgePill(bf, val) {
      document.querySelectorAll(`.bf-pill[data-bf="${bf}"]`).forEach(b => {
        b.classList.toggle('active', (b.getAttribute('data-val') || '') === (val || ''));
      });
      const inp = document.getElementById('filter-' + bf);
      if (inp) inp.value = val || '';
      renderTable();
    }
    document.querySelectorAll('.bf-pill[data-bf]').forEach(b => {
      b.addEventListener('click', () => applyBadgePill(b.getAttribute('data-bf'), b.getAttribute('data-val') || ''));
    });

    // 3-mode owner pill: Anyone -> Mine only -> Others -> Anyone
    const CURRENT_USER = 'Mark Stowell';
    const OWNER_CYCLE = [
      { mode: 'any',    label: 'Anyone',    prep: '' },
      { mode: 'mine',   label: 'Mine only', prep: CURRENT_USER },
      { mode: 'others', label: 'Others',    prep: '__not_me__' }
    ];
    document.getElementById('bf-owner').addEventListener('click', () => {
      const cur = document.getElementById('bf-owner').getAttribute('data-owner-mode') || 'any';
      const idx = OWNER_CYCLE.findIndex(o => o.mode === cur);
      const next = OWNER_CYCLE[(idx + 1) % OWNER_CYCLE.length];
      const btn = document.getElementById('bf-owner');
      btn.setAttribute('data-owner-mode', next.mode);
      document.getElementById('bf-owner-label').textContent = next.label;
      document.getElementById('filter-prep').value = next.prep;
      renderTable();
    });

    document.getElementById('reset-data').addEventListener('click', () => {
      MockUI.confirmAction('Reset mockup data — clears any quote you have in progress. Continue?', () => {
        MockState.reset();
        MockUI.toast('Demo data reset', 'success');
        renderTable();
      });
    });

    document.getElementById('export-btn').addEventListener('click', () => {
      MockUI.toast('Mockup — would download a CSV of the current view');
    });

    // Re-render when state syncs in from another browser
    window.addEventListener('mock-state-synced', () => renderTable());

    // Apply initial status from URL ?filter= (legacy sidebar links use this)
    applyBadgePill('status', initialStatus);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Quotes — SKS Quotes</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="../shared/theme.css">
  <link rel="stylesheet" href="css/mockups.css">
  <style>
    .quote-num { font-family: var(--font-heading); font-weight: 600; color: var(--text-primary); }
    .quote-rev { color: var(--text-muted); font-size: 11px; margin-left: 6px; font-weight: 500; }
    .quote-client { font-weight: 500; color: var(--text-primary); }
    .quote-project { color: var(--text-secondary); font-size: 12px; margin-top: 1px; }
    .quote-value { font-family: var(--font-heading); font-weight: 600; color: var(--text-primary); text-align: right; white-space: nowrap; }
    .quote-date { color: var(--text-secondary); white-space: nowrap; font-size: 12px; }
    .quote-prepared { color: var(--text-secondary); white-space: nowrap; font-size: 12px; }
    .row-actions { display: flex; gap: 4px; justify-content: flex-end; }
    .no-results { padding: 40px 20px; text-align: center; color: var(--text-muted); }
    .no-results .material-symbols-outlined { font-size: 36px; color: var(--border-hover); margin-bottom: 8px; }
    .no-results h4 { font-family: var(--font-heading); font-size: 14px; font-weight: 600; color: var(--text-secondary); margin: 4px 0; }
  </style>
</head>
<body data-page="quotes">

  <main id="content" class="content">

    <!-- KPI strip -->
    <div class="kpi-grid" id="kpi-host"></div>

    <!-- Filters -->
    <div class="filters-row">
      <div class="search-wrap">
        <span class="material-symbols-outlined">search</span>
        <input id="filter-search" type="text" class="form-input" placeholder="Search by quote #, client, project…">
      </div>
      <select class="form-input" id="filter-status">
        <option value="">All statuses</option>
        <option value="draft">Draft</option>
        <option value="issued">Issued</option>
        <option value="accepted">Accepted</option>
        <option value="declined">Declined</option>
        <option value="expired">Expired</option>
        <option value="revised">Revised</option>
      </select>
      <select class="form-input" id="filter-mode">
        <option value="">All modes</option>
        <option value="quick">Quick</option>
        <option value="large">Large</option>
      </select>
      <select class="form-input" id="filter-prep">
        <option value="">All estimators</option>
        <option value="Mark Stowell">Mark Stowell</option>
        <option value="Steven Carmichael">Steven Carmichael</option>
      </select>
      <select class="form-input" id="filter-sort">
        <option value="newest">Sort: Newest first</option>
        <option value="oldest">Sort: Oldest first</option>
        <option value="value-high">Sort: Value high → low</option>
        <option value="value-low">Sort: Value low → high</option>
        <option value="client">Sort: Client A–Z</option>
      </select>
      <button class="btn btn-secondary btn-sm" id="reset-data" title="Reset mockup data to defaults"><span class="material-symbols-outlined">restart_alt</span> Reset demo</button>
    </div>

    <!-- Quote table -->
    <div class="table-wrap" id="table-host"></div>

  </main>

  <script src="js/mock-data.js"></script>
  <script src="js/mock-state.js"></script>
  <script src="js/mock-ui.js"></script>
  <script src="js/mock-shell.js"></script>
  <script>
    MockShell.mount({
      title: 'Quotes',
      subtitle: 'All quotes',
      actionsHtml: `
        <button class="btn btn-secondary" id="export-btn"><span class="material-symbols-outlined">file_download</span> Export</button>
        <a class="btn btn-primary" href="02-mode-select.html"><span class="material-symbols-outlined">add</span> New Quote</a>`
    });

    // -------- Read URL filter (e.g. ?filter=draft from sidebar) --------
    const params = new URLSearchParams(location.search);
    if (params.get('filter')) {
      document.getElementById('filter-status').value = params.get('filter');
    }

    // -------- KPI computations --------
    function renderKpis(quotes) {
      const openPipeline = quotes.filter(q => q.status === 'issued').reduce((s, q) => s + (q.value || 0), 0);
      const draftCount = quotes.filter(q => q.status === 'draft').length;
      const wonFy = quotes.filter(q => q.status === 'accepted').reduce((s, q) => s + (q.value || 0), 0);
      const wonCount = quotes.filter(q => q.status === 'accepted').length;
      const decided = quotes.filter(q => ['accepted','declined'].includes(q.status));
      const winRate = decided.length ? Math.round((decided.filter(q => q.status === 'accepted').length / decided.length) * 100) : 0;

      document.getElementById('kpi-host').innerHTML = `
        <div class="kpi">
          <div class="kpi-label">Open Pipeline</div>
          <div class="kpi-value">${MockUI.fmtMoney(openPipeline)}</div>
          <div class="kpi-sub">Issued, not yet decided</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Drafts in Progress</div>
          <div class="kpi-value">${draftCount}</div>
          <div class="kpi-sub">${draftCount === 1 ? 'In your queue' : 'Across the team'}</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Won this FY</div>
          <div class="kpi-value">${MockUI.fmtMoney(wonFy)}</div>
          <div class="kpi-sub">${wonCount} quote${wonCount === 1 ? '' : 's'} accepted</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Win Rate</div>
          <div class="kpi-value">${winRate}%</div>
          <div class="kpi-sub">Last 12 months</div>
        </div>
      `;
    }

    // -------- Filter + sort --------
    function filterAndSort(quotes) {
      const q   = document.getElementById('filter-search').value.trim().toLowerCase();
      const st  = document.getElementById('filter-status').value;
      const md  = document.getElementById('filter-mode').value;
      const pr  = document.getElementById('filter-prep').value;
      const so  = document.getElementById('filter-sort').value;

      let out = quotes.slice();
      if (q)  out = out.filter(qq => (qq.number + ' ' + (qq.client.name || '') + ' ' + (qq.project.name || '')).toLowerCase().includes(q));
      if (st) out = out.filter(qq => qq.status === st);
      if (md) out = out.filter(qq => qq.mode === md);
      if (pr) out = out.filter(qq => qq.preparedBy === pr);

      out.sort((a, b) => {
        switch (so) {
          case 'oldest':     return (a.createdAt || '').localeCompare(b.createdAt || '');
          case 'value-high': return (b.value || 0) - (a.value || 0);
          case 'value-low':  return (a.value || 0) - (b.value || 0);
          case 'client':     return (a.client.name || '').localeCompare(b.client.name || '');
          case 'newest':
          default:           return (b.createdAt || '').localeCompare(a.createdAt || '');
        }
      });
      return out;
    }

    // -------- Render table --------
    function renderTable() {
      const all = MockState.getQuotes();
      renderKpis(all);
      const rows = filterAndSort(all);
      const host = document.getElementById('table-host');

      if (rows.length === 0) {
        host.innerHTML = `
          <div class="no-results">
            <span class="material-symbols-outlined">search_off</span>
            <h4>No quotes match those filters</h4>
            <div style="font-size:13px;">Clear the filters or start a new quote.</div>
          </div>`;
        return;
      }

      const rowsHtml = rows.map(q => {
        const badge = MockUI.statusBadge(q.status);
        return `
          <tr class="clickable" data-open="${q.id}">
            <td>
              <span class="quote-num">${q.number}</span>
              <span class="quote-rev">Rev ${q.revision}</span>
            </td>
            <td>
              <div class="quote-client">${q.client.name || '—'}</div>
              <div class="quote-project">${q.project.name || '—'}</div>
            </td>
            <td class="num right">${q.value ? MockUI.fmtMoney(q.value) : '—'}</td>
            <td class="quote-date">${q.status === 'draft' ? '—' : MockUI.fmtDate(q.createdAt)}</td>
            <td class="quote-date">${q.status === 'draft' ? '—' : MockUI.fmtDate(q.validUntil)}</td>
            <td><span class="${badge.cls}">${badge.label}</span></td>
            <td><span class="badge badge-muted" style="text-transform:capitalize;">${q.mode}</span></td>
            <td class="quote-prepared">${(q.preparedBy || '').replace(/^(\w+)\s+(\w).*/, '$1 $2.')}</td>
            <td class="right">
              <div class="row-actions">
                <button class="icon-btn" title="${q.status === 'draft' ? 'Edit' : 'View'}" data-open="${q.id}">
                  <span class="material-symbols-outlined">${q.status === 'draft' ? 'edit' : 'visibility'}</span>
                </button>
                <button class="icon-btn" title="More" data-more="${q.id}"><span class="material-symbols-outlined">more_horiz</span></button>
              </div>
            </td>
          </tr>`;
      }).join('');

      host.innerHTML = `
        <div class="table-scroll">
          <table class="data-table">
            <thead>
              <tr>
                <th>Quote #</th>
                <th>Client / Project</th>
                <th class="right">Value</th>
                <th>Issued</th>
                <th>Valid Until</th>
                <th>Status</th>
                <th>Mode</th>
                <th>Prepared by</th>
                <th class="right"></th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
        <div class="pagination">
          <div>Showing ${rows.length} of ${all.length}</div>
          <div class="pager">
            <button class="pager-btn" disabled>‹ Prev</button>
            <button class="pager-btn active">1</button>
            <button class="pager-btn" disabled>Next ›</button>
          </div>
        </div>`;

      // Wire row clicks
      host.querySelectorAll('[data-open]').forEach(el => {
        el.addEventListener('click', e => {
          e.stopPropagation();
          const id = el.getAttribute('data-open');
          MockState.setCurrentQuote(id);
          const q = MockState.getQuote(id);
          // Drafts open the builder; issued quotes open the output preview
          location.href = q.status === 'draft' ? '04-area-builder.html' : '06-output-preview.html';
        });
      });

      host.querySelectorAll('[data-more]').forEach(el => {
        el.addEventListener('click', e => {
          e.stopPropagation();
          MockUI.toast('Mockup — would open a context menu (duplicate / revise / archive / delete)');
        });
      });
    }

    // -------- Wire filters --------
    ['filter-search','filter-status','filter-mode','filter-prep','filter-sort'].forEach(id => {
      document.getElementById(id).addEventListener('input', renderTable);
      document.getElementById(id).addEventListener('change', renderTable);
    });

    document.getElementById('reset-data').addEventListener('click', () => {
      MockUI.confirmAction('Reset mockup data — clears any quote you have in progress. Continue?', () => {
        MockState.reset();
        MockUI.toast('Demo data reset', 'success');
        renderTable();
      });
    });

    document.getElementById('export-btn').addEventListener('click', () => {
      MockUI.toast('Mockup — would download a CSV of the current view');
    });

    renderTable();
  </script>
</body>
</html>
